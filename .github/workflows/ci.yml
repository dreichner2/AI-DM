name: AIDM CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      run_visual_smoke:
        description: Run visual smoke screenshots
        required: false
        default: 'false'

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.14.6'
      - name: Install backend dependencies
        run: python -m pip install --require-hashes --constraint requirements.constraints.txt -r requirements-dev.lock.txt
      - name: Secret scan
        run: python scripts/scan_secrets.py
      - name: Python dependency audit
        run: python -m pip_audit -r requirements.runtime.lock.txt
      - name: Python lint
        run: python -m ruff check --select E9,F63,F7,F82 aidm_server tests scripts
      - name: Run backend tests
        env:
          AIDM_ENV: test
          AIDM_AUTO_CREATE_SCHEMA: 'true'
          AIDM_TELEMETRY_ENABLED: 'false'
        run: python -m pytest
      - name: Check generated API types
        run: python scripts/generate_api_types.py --check

  postgres-integration:
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:18.4-bookworm@sha256:d9c83446333daec3f0588cc709adb80c26090b7f9f0f7ec8d43c243385d79818
        env:
          POSTGRES_DB: aidm
          POSTGRES_USER: aidm
          POSTGRES_PASSWORD: aidm-ci-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aidm -d aidm"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      AIDM_ENV: production
      AIDM_DEBUG: 'false'
      AIDM_DATABASE_URI: postgresql+psycopg://aidm:aidm-ci-password@127.0.0.1:5432/aidm
      AIDM_POSTGRES_TEST_URI: postgresql+psycopg://aidm:aidm-ci-password@127.0.0.1:5432/aidm
      AIDM_AUTO_CREATE_SCHEMA: 'false'
      FLASK_SECRET_KEY: ci-only-production-secret-that-is-long-enough
      AIDM_AUTH_REQUIRED: 'true'
      AIDM_API_AUTH_TOKENS: ci-operator-token
      AIDM_CORS_ALLOWLIST: https://aidm-ci.example.test
      AIDM_SOCKET_CORS_ALLOWLIST: https://aidm-ci.example.test
      AIDM_RATE_LIMIT_STORE: database
      AIDM_TURN_COORDINATOR_STORE: database
      AIDM_SOCKETIO_ASYNC_MODE: threading
      AIDM_SOCKETIO_WORKER_MODEL: single
      AIDM_GUNICORN_THREADS: '16'
      AIDM_SECURITY_HEADERS_ENABLED: 'true'
      AIDM_OBSERVABILITY_PROVIDER: github-actions
      AIDM_ALERT_OWNER: ci
      AIDM_TELEMETRY_ENABLED: 'false'
      AIDM_ACCOUNT_COOKIE_AUTH_ENABLED: 'true'
      AIDM_ACCOUNT_COOKIE_SECURE: 'true'
      AIDM_ACCOUNT_TOKEN_RESPONSE_ENABLED: 'false'
      AIDM_LLM_PROVIDER: fallback
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.14.6'
      - name: Install backend runtime dependencies
        run: python -m pip install --require-hashes --constraint requirements.constraints.txt -r requirements-dev.lock.txt
      - name: Verify PostgreSQL server version
        run: |
          python - <<'PY'
          import os

          import psycopg

          database_uri = os.environ['AIDM_DATABASE_URI'].replace(
              'postgresql+psycopg://', 'postgresql://', 1
          )
          with psycopg.connect(database_uri) as connection:
              server_version = connection.execute('SHOW server_version').fetchone()[0]
          print(f'PostgreSQL server version: {server_version}')
          if not server_version.startswith('18.4'):
              raise SystemExit(f'Expected PostgreSQL 18.4, got {server_version!r}.')
          PY
      - name: Run migrations and production bootstrap against PostgreSQL
        run: python -m aidm_server.deploy_bootstrap --check-only --host 0.0.0.0
      - name: Verify migrated schema matches runtime metadata
        run: python -m flask --app aidm_server.main:create_app db check
      - name: Verify hosted database readiness round trip
        run: python scripts/deployment_readiness_check.py --allow-fallback-provider
      - name: Smoke production WSGI and Gunicorn threaded entrypoint
        timeout-minutes: 3
        run: |
          log_path="$RUNNER_TEMP/aidm-production-entrypoint.log"
          readiness_path="tmp/release/postgres-ci-readiness.md"
          python - <<'PY'
          from aidm_server.auth import hash_secret
          from aidm_server.database import db
          from aidm_server.main import create_app
          from aidm_server.models import Account, AccountWorkspaceMembership

          app = create_app()
          with app.app_context():
              account = Account.query.filter_by(username='ci-mapper-probe').first()
              if account is None:
                  account = Account(
                      username='ci-mapper-probe',
                      first_name='CI',
                      last_name='Mapper Probe',
                  )
                  db.session.add(account)
                  db.session.flush()
              account.password_hash = 'configured-for-ci-only'
              account.account_token_hash = hash_secret('ci-account-token')
              membership = AccountWorkspaceMembership.query.filter_by(
                  account_id=account.account_id,
                  workspace_id='owner',
              ).first()
              if membership is None:
                  membership = AccountWorkspaceMembership(
                      account_id=account.account_id,
                      workspace_id='owner',
                  )
                  db.session.add(membership)
              membership.role = 'admin'
              db.session.commit()
          PY
          PORT=5099 scripts/run_production_server.sh >"$log_path" 2>&1 &
          server_pid=$!
          cleanup() {
            if kill -0 "$server_pid" 2>/dev/null; then
              kill -TERM "$server_pid" 2>/dev/null || true
            fi
            wait "$server_pid" 2>/dev/null || true
          }
          trap cleanup EXIT
          ready=false
          for _attempt in $(seq 1 45); do
            if ! kill -0 "$server_pid" 2>/dev/null; then
              cat "$log_path"
              exit 1
            fi
            if curl --fail --silent http://127.0.0.1:5099/api/health >/dev/null; then
              ready=true
              break
            fi
            sleep 1
          done
          if [[ "$ready" != "true" ]]; then
            cat "$log_path"
            exit 1
          fi
          python - <<'PY'
          from concurrent.futures import ThreadPoolExecutor
          from threading import Barrier

          import requests
          import socketio

          target_url = 'http://127.0.0.1:5099'
          account_probe_count = 16
          account_probe_barrier = Barrier(account_probe_count)

          def probe_account_metrics(index):
              account_probe_barrier.wait(timeout=5)
              metrics_path = '/api/metrics/prometheus' if index % 2 else '/api/metrics'
              response = requests.get(
                  f'{target_url}{metrics_path}',
                  headers={
                      'Authorization': 'Bearer ci-account-token',
                      'X-AIDM-Workspace-Id': 'owner',
                  },
                  timeout=5,
              )
              response.raise_for_status()
              return response.status_code

          clients = []
          try:
              with ThreadPoolExecutor(max_workers=account_probe_count) as executor:
                  account_probe_statuses = list(
                      executor.map(probe_account_metrics, range(account_probe_count))
                  )
              if account_probe_statuses != [200] * account_probe_count:
                  raise RuntimeError(
                      f'Unexpected account metrics statuses: {account_probe_statuses!r}.'
                  )

              for _index in range(4):
                  client = socketio.Client(
                      reconnection=False,
                      request_timeout=5,
                      websocket_extra_options={'origin': 'https://aidm-ci.example.test'},
                  )
                  if _index == 0:
                      headers = {
                          'Authorization': 'Bearer ci-account-token',
                          'X-AIDM-Workspace-Id': 'owner',
                      }
                      auth = {
                          'account_token': 'ci-account-token',
                          'workspace_id': 'owner',
                      }
                  else:
                      headers = {'Authorization': 'Bearer ci-operator-token'}
                      auth = {'workspace_token': 'ci-operator-token'}
                  client.connect(
                      target_url,
                      headers=headers,
                      auth=auth,
                      transports=['websocket'],
                      wait_timeout=5,
                  )
                  if client.transport() != 'websocket':
                      raise RuntimeError(f'Expected websocket transport, got {client.transport()!r}.')
                  clients.append(client)

              requests.get(f'{target_url}/api/health', timeout=5).raise_for_status()
              requests.get(
                  f'{target_url}/api/metrics',
                  headers={'Authorization': 'Bearer ci-operator-token'},
                  timeout=5,
              ).raise_for_status()
          finally:
              for client in clients:
                  client.disconnect()
          PY
          python scripts/deployment_readiness_check.py \
            --target-url http://127.0.0.1:5099 \
            --auth-token ci-operator-token \
            --socketio-origin https://aidm-ci.example.test \
            --allow-fallback-provider \
            --evidence-report "$readiness_path"
          cleanup
          trap - EXIT
      - name: Exercise PostgreSQL concurrency primitives
        run: python -m pytest -q tests/test_postgres_runtime.py
      - name: Exercise PostgreSQL auth and data-integrity smokes
        run: |
          python scripts/hosted_cookie_auth_smoke.py \
            --database-uri "$AIDM_DATABASE_URI" \
            --evidence-report tmp/release/postgres-ci-cookie-auth.md
          python scripts/security_forbidden_smoke.py \
            --database-uri "$AIDM_DATABASE_URI" \
            --evidence-report tmp/release/postgres-ci-security-forbidden.md
          python scripts/session_export_import_smoke.py \
            --database-uri "$AIDM_DATABASE_URI" \
            --evidence-report tmp/release/postgres-ci-export-import.md
      - name: Upload PostgreSQL production rehearsal evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: postgres-production-rehearsal
          path: tmp/release/postgres-ci-*.md
          if-no-files-found: warn

  frontend:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: aidm_frontend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: aidm_frontend/package-lock.json
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.14.6'
      - name: Install and verify npm 12.0.0
        run: |
          npm install --global npm@12.0.0
          test "$(npm --version)" = "12.0.0"
      - name: Install frontend dependencies
        run: npm ci
      - name: Production dependency audit
        run: npm audit --omit=dev
      - name: Install backend dependencies for browser smoke
        working-directory: .
        run: python -m pip install --require-hashes --constraint requirements.constraints.txt -r requirements-dev.lock.txt
      - name: Test frontend
        run: npm test
      - name: Build
        run: npm run build
      - name: Bundle budget
        run: npm run bundle:budget
      - name: Browser smoke
        timeout-minutes: 20
        env:
          PYTHON: python
        run: |
          if command -v google-chrome >/dev/null 2>&1; then
            echo "Using system Chrome for browser smoke."
            export PLAYWRIGHT_CHROMIUM_CHANNEL=chrome
          else
            npx --no-install playwright install chromium
          fi
          export PYTHON="$(python -c 'import sys; print(sys.executable)')"
          npm run smoke:browser

  visual-smoke:
    runs-on: ubuntu-24.04
    if: github.event_name == 'schedule' || github.event.inputs.run_visual_smoke == 'true'
    defaults:
      run:
        working-directory: aidm_frontend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: aidm_frontend/package-lock.json
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.14.6'
      - name: Install and verify npm 12.0.0
        run: |
          npm install --global npm@12.0.0
          test "$(npm --version)" = "12.0.0"
      - name: Install frontend dependencies
        run: npm ci
      - name: Install backend dependencies
        working-directory: .
        run: python -m pip install --require-hashes --constraint requirements.constraints.txt -r requirements-dev.lock.txt
      - name: Visual smoke screenshots
        timeout-minutes: 20
        env:
          PYTHON: python
        run: |
          if command -v google-chrome >/dev/null 2>&1; then
            echo "Using system Chrome for visual smoke."
            export PLAYWRIGHT_CHROMIUM_CHANNEL=chrome
          else
            npx --no-install playwright install chromium
          fi
          export PYTHON="$(python -c 'import sys; print(sys.executable)')"
          npm run smoke:visual
      - name: Upload visual smoke artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: visual-smoke
          path: tmp/verification_artifacts/visual-smoke
