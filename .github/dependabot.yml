version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
    open-pull-requests-limit: 5
    groups:
      python-runtime:
        patterns:
          - '*'
    ignore:
      # pydantic 2.13.4 requires pydantic-core==2.46.4 exactly. Revisit this
      # transitive hold when a stable pydantic release can move the pair.
      - dependency-name: pydantic-core
        versions:
          - '>2.46.4'

  - package-ecosystem: npm
    directory: /aidm_frontend
    schedule:
      interval: weekly
      day: monday
      time: '09:30'
    open-pull-requests-limit: 5
    groups:
      frontend-runtime:
        patterns:
          - '*'
    ignore:
      # Runtime and type declarations intentionally share the Node 24 API.
      - dependency-name: '@types/node'
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '10:00'
    open-pull-requests-limit: 5
    groups:
      workflow-actions:
        patterns:
          - '*'

  - package-ecosystem: docker-compose
    directory: /observability
    schedule:
      interval: weekly
      day: monday
      time: '10:30'
    open-pull-requests-limit: 5
